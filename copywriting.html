<!doctype html>
<html lang="zh-CN">

    <link rel="stylesheet" href="./copywriting.css" />
  </head>

    <main class="showcase-page" aria-label="文案设计作品展示">
      <section class="browser-mockup" aria-label="网页端截图">
        <div class="browser-bar" aria-hidden="true">
          <div class="window-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="address-pill">copywriting.portfolio</div>
        </div>
        <span class="category-badge" id="web-category">知识分享</span>
        <div class="browser-screen synced-scroll" id="web-screen">
          <img src="./assets/copywriting/web/web-6.png" alt="网页端文案作品 6" />
          <img src="./assets/copywriting/web/web-1.png" alt="网页端文案作品 1" />
          <img src="./assets/copywriting/web/web-5.png" alt="网页端文案作品 5" />

          <img src="./assets/copywriting/web/web-7.png" alt="网页端文案作品 7" />
          <img src="./assets/copywriting/web/web-8.png" alt="网页端文案作品 8" />
          <img src="./assets/copywriting/web/web-wechat.jpg" alt="网页端公众号作品" />
        </div>
      </section>

      <section class="phone-mockup" aria-label="手机端截图">
        <div class="phone-shell">
          <span class="category-badge phone-category" id="phone-category">知识分享</span>
          <div class="phone-island" aria-hidden="true"></div>
          <div class="phone-screen synced-scroll" id="phone-screen">
            <img src="./assets/copywriting/knowledge-3.png" alt="手机端文案作品 6" />
            <img src="./assets/copywriting/knowledge-1.png" alt="手机端文案作品 1" />
            <img src="./assets/copywriting/knowledge-2.png" alt="手机端文案作品 5" />

            <img src="./assets/copywriting/travel-2.png" alt="手机端文案作品 4" />
            <img src="./assets/copywriting/marketing-1.png" alt="手机端文案作品 3" />
            <img src="./assets/copywriting/marketing-2.png" alt="手机端文案作品 7" />
            <img src="./assets/copywriting/marketing-3.png" alt="手机端文案作品 8" />
            <img src="./assets/copywriting/wechat-1.jpg" alt="手机端公众号作品" />
